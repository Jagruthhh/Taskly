version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskly-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
      POSTGRES_DB: taskly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - taskly-network

volumes:
  postgres_data:
    driver: local

networks:
  taskly-network:
    driver: bridge
